<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My QR Code</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Ambient particles -->
<canvas id="particles"></canvas>

<!-- Gold corner accents -->
<div class="corner corner--tl"></div>
<div class="corner corner--tr"></div>
<div class="corner corner--bl"></div>
<div class="corner corner--br"></div>

<div class="wrapper">

    <p class="label label--top">
        <span class="label-line"></span>
        <span class="label-text">MY CARD</span>
        <span class="label-line"></span>
    </p>

    <div class="scene" id="card">

        <!-- Gold shimmer border (SVG animated) -->
        <svg class="card-border" viewBox="0 0 520 290" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect class="border-path" x="1" y="1" width="518" height="288" rx="19"/>
        </svg>

        <div class="card-inner">

            <div class="card-face front">
                <img src="images/front.png" alt="Front Card">
            </div>

            <div class="card-face back">
                <img src="images/back.png" alt="Back Card">
            </div>

        </div>
    </div>

    <p class="label label--bottom">
        <span class="label-dot"></span>
        <span class="label-text">คลิกเพื่อพลิกบัตร</span>
        <span class="label-dot"></span>
    </p>

</div>

<script src="script.js"></script>

</body>
</html>
